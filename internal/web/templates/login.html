<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <title>{{.Title}} - Gatekeeper</title>
    {{template "head" .}}
    <style>
        .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 2.5rem; width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; margin-bottom: 0.5rem; }
        .login-box .subtitle { text-align: center; color: var(--fg2); font-size: 0.9rem; margin-bottom: 2rem; }
        .login-box .error { background: rgba(248,113,113,0.1); border: 1px solid var(--red); color: var(--red); padding: 0.5rem 0.75rem; border-radius: 0.25rem; margin-bottom: 1rem; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <h1 style="color: var(--accent);">Gatekeeper</h1>
        <p class="subtitle">Firewall Management</p>
        {{if .Error}}<div class="error">Invalid API key. Please try again.</div>{{end}}
        <form method="POST" action="/login">
            <div class="field">
                <label for="api_key">API Key</label>
                <input type="password" id="api_key" name="api_key" placeholder="Enter your API key" autofocus required>
            </div>
            <button type="submit" style="width:100%; margin-top:0.5rem;">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
