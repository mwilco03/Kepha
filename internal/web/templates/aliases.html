<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Gatekeeper</title>
    <style>
        :root { --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --fg: #e2e8f0; --fg2: #94a3b8; --accent: #38bdf8; --border: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); }
        a { color: var(--accent); text-decoration: none; }
        nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        nav a { color: var(--fg2); font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg3); font-size: 0.8rem; text-transform: uppercase; color: var(--fg2); }
        td { font-family: 'SF Mono', monospace; font-size: 0.85rem; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; background: rgba(56, 189, 248, 0.15); color: var(--accent); }
        .members { color: var(--fg2); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">Gatekeeper</span>
        <a href="/">Dashboard</a>
        <a href="/zones">Zones</a>
        <a href="/aliases">Aliases</a>
        <a href="/devices">Devices</a>
        <a href="/policies">Policies</a>
        <a href="/config">Config</a>
    </nav>
    <div class="container">
        <h1>Aliases</h1>
        {{if .Aliases}}
        <table>
            <thead><tr><th>Name</th><th>Type</th><th>Members</th><th>Description</th></tr></thead>
            <tbody>
            {{range .Aliases}}
            <tr>
                <td>{{.Name}}</td>
                <td><span class="badge">{{.Type}}</span></td>
                <td class="members">{{range $i, $m := .Members}}{{if $i}}, {{end}}{{$m}}{{end}}</td>
                <td>{{.Description}}</td>
            </tr>
            {{end}}
            </tbody>
        </table>
        {{else}}<p style="color: var(--fg2)">No aliases defined.</p>{{end}}
    </div>
</body>
</html>
