{{define "head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/static/htmx.min.js"></script>
<script>
// CSRF: send session cookie value as X-CSRF-Token header on htmx requests.
document.addEventListener('htmx:configRequest', function(e) {
    var m = document.cookie.match(/gk_csrf=([^;]+)/);
    if (m) e.detail.headers['X-CSRF-Token'] = m[1];
});
</script>
<link rel="stylesheet" href="/static/style.css">
<style>
    :root { --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --fg: #e2e8f0; --fg2: #94a3b8; --accent: #38bdf8; --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --border: #475569; }
    @media (prefers-color-scheme: light) {
        :root { --bg: #f8fafc; --bg2: #ffffff; --bg3: #e2e8f0; --fg: #1e293b; --fg2: #64748b; --accent: #0284c7; --green: #16a34a; --red: #dc2626; --yellow: #ca8a04; --border: #cbd5e1; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); }
    a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }
    nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 2rem; }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    nav a { color: var(--fg2); font-size: 0.9rem; } nav a:hover { color: var(--fg); text-decoration: none; }
    nav a.active { color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .grid-wide { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.25rem; transition: border-color 0.15s; }
    .card:hover { border-color: var(--accent); }
    .card .label { font-size: 0.8rem; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
    .card .value.green { color: var(--green); } .card .value.blue { color: var(--accent); }
    .card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .card .meta { font-size: 0.85rem; color: var(--fg2); font-family: 'SF Mono', 'Fira Code', monospace; }
    table { width: 100%; border-collapse: collapse; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; margin-bottom: 1.5rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg3); font-size: 0.8rem; text-transform: uppercase; color: var(--fg2); letter-spacing: 0.05em; }
    td { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }
    tr:hover td { background: rgba(56, 189, 248, 0.03); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .badge-blue { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
    .badge-red { background: rgba(248, 113, 113, 0.15); color: var(--red); }
    .badge-yellow { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
    pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; overflow-x: auto; font-size: 0.8rem; max-height: 400px; }
    .meta-block { font-family: 'SF Mono', monospace; font-size: 0.9rem; color: var(--fg2); background: var(--bg2); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); }
    form { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--fg2); margin-bottom: 0.25rem; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.25rem; color: var(--fg); font-family: 'SF Mono', monospace; font-size: 0.9rem; }
    input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-color: var(--accent); }
    button, .btn { background: var(--accent); color: var(--bg); padding: 0.6rem 1.5rem; border: none; border-radius: 0.25rem; font-weight: 600; cursor: pointer; font-size: 0.9rem; display: inline-block; text-decoration: none; }
    button:hover, .btn:hover { opacity: 0.9; }
    a:focus-visible, button:focus-visible, .btn:focus-visible, nav a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .skip-link { position: absolute; left: -9999px; top: 0; z-index: 1000; padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); font-weight: 600; }
    .skip-link:focus { left: 1rem; top: 0.5rem; }
    .success { color: var(--green); margin-top: 1rem; }
    .text-muted { color: var(--fg2); }
    .empty { color: var(--fg2); padding: 2rem; text-align: center; }
</style>
{{end}}

{{define "nav"}}
<a href="#main-content" class="skip-link">Skip to main content</a>
<nav aria-label="Main navigation">
    <span class="logo">Gatekeeper</span>
    <a href="/" {{if eq .Title "Dashboard"}}class="active" aria-current="page"{{end}}>Dashboard</a>
    <a href="/zones" {{if eq .Title "Zones"}}class="active" aria-current="page"{{end}}>Zones</a>
    <a href="/aliases" {{if eq .Title "Aliases"}}class="active" aria-current="page"{{end}}>Aliases</a>
    <a href="/devices" {{if eq .Title "Devices"}}class="active" aria-current="page"{{end}}>Devices</a>
    <a href="/policies" {{if eq .Title "Policies"}}class="active" aria-current="page"{{end}}>Policies</a>
    <a href="/firewall" {{if eq .Title "Firewall"}}class="active" aria-current="page"{{end}}>Firewall</a>
    <a href="/config" {{if eq .Title "Configuration"}}class="active" aria-current="page"{{end}}>Config</a>
    <a href="/assign" {{if eq .Title "Assign Device"}}class="active" aria-current="page"{{end}}>Assign</a>
    <a href="/leases" {{if eq .Title "DHCP Leases"}}class="active" aria-current="page"{{end}}>Leases</a>
    <a href="/wireguard" {{if eq .Title "WireGuard"}}class="active" aria-current="page"{{end}}>WireGuard</a>
    <a href="/services" {{if eq .Title "Services"}}class="active" aria-current="page"{{end}}>Services</a>
    <a href="/logout" style="margin-left:auto; color:var(--red);">Logout</a>
</nav>
{{end}}
