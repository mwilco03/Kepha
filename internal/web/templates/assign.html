<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Gatekeeper</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --fg: #e2e8f0; --fg2: #94a3b8; --accent: #38bdf8; --green: #4ade80; --border: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); }
        a { color: var(--accent); text-decoration: none; }
        nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        nav a { color: var(--fg2); font-size: 0.9rem; }
        .container { max-width: 600px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        form { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: var(--fg2); margin-bottom: 0.25rem; }
        input, select { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.25rem; color: var(--fg); font-family: 'SF Mono', monospace; font-size: 0.9rem; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        button { background: var(--accent); color: var(--bg); padding: 0.6rem 1.5rem; border: none; border-radius: 0.25rem; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        button:hover { opacity: 0.9; }
        .success { color: var(--green); margin-top: 1rem; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">Gatekeeper</span>
        <a href="/">Dashboard</a>
        <a href="/zones">Zones</a>
        <a href="/aliases">Aliases</a>
        <a href="/devices">Devices</a>
        <a href="/policies">Policies</a>
        <a href="/config">Config</a>
        <a href="/assign">Assign</a>
    </nav>
    <div class="container">
        <h1>Assign Device</h1>
        <form hx-post="/api/v1/assign" hx-target="#result" hx-swap="innerHTML">
            <div class="field">
                <label for="ip">IP Address</label>
                <input type="text" id="ip" name="ip" placeholder="10.10.0.50" required>
            </div>
            <div class="field">
                <label for="hostname">Hostname</label>
                <input type="text" id="hostname" name="hostname" placeholder="workstation-1">
            </div>
            <div class="field">
                <label for="mac">MAC Address</label>
                <input type="text" id="mac" name="mac" placeholder="aa:bb:cc:dd:ee:ff">
            </div>
            <div class="field">
                <label for="profile">Profile</label>
                <select id="profile" name="profile">
                {{range .Profiles}}
                    <option value="{{.Name}}">{{.Name}}</option>
                {{end}}
                </select>
            </div>
            <button type="submit">Assign</button>
        </form>
        <div id="result"></div>
    </div>
</body>
</html>
