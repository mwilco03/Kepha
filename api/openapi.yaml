openapi: "3.1.0"
info:
  title: Gatekeeper Firewall API
  version: "1.0.0"
  description: |
    REST API for the Gatekeeper network firewall control plane.
    All mutation endpoints require API key authentication via `X-API-Key` header.
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Zone:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        interface:
          type: string
        network_cidr:
          type: string
        trust_level:
          type: string
          enum: [none, low, medium, full]
        description:
          type: string
      required: [name]

    Alias:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [host, network, port, mac, nested, external_url]
        description:
          type: string
        members:
          type: array
          items:
            type: string
      required: [name, type]

    Policy:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        default_action:
          type: string
          enum: [allow, deny, reject, log]
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
      required: [name, default_action]

    Rule:
      type: object
      properties:
        id:
          type: integer
        policy_id:
          type: integer
        order:
          type: integer
        src_alias:
          type: string
        dst_alias:
          type: string
        protocol:
          type: string
        ports:
          type: string
        action:
          type: string
          enum: [allow, deny, reject, log]
        log:
          type: boolean
        description:
          type: string

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        zone_id:
          type: integer
        policy_name:
          type: string
      required: [name, zone_id]

    DeviceAssignment:
      type: object
      properties:
        id:
          type: integer
        ip:
          type: string
        mac:
          type: string
        hostname:
          type: string
        profile_id:
          type: integer
        assigned_at:
          type: string
          format: date-time
      required: [ip]

    WGPeer:
      type: object
      properties:
        public_key:
          type: string
        allowed_ips:
          type: string
        endpoint:
          type: string
        name:
          type: string
      required: [public_key, allowed_ips]

    ConfigRevision:
      type: object
      properties:
        rev_number:
          type: integer
        timestamp:
          type: string
        message:
          type: string

    Lease:
      type: object
      properties:
        expiry:
          type: string
        mac:
          type: string
        ip:
          type: string
        hostname:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

paths:
  /api/v1/status:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string

  /api/v1/zones:
    get:
      summary: List all zones
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      summary: Create a zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Zone"
      responses:
        "201":
          description: Zone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/zones/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a zone by name
      responses:
        "200":
          description: Zone details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "404":
          description: Not found
    put:
      summary: Update a zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Zone"
      responses:
        "200":
          description: Zone updated
    delete:
      summary: Delete a zone
      responses:
        "200":
          description: Zone deleted

  /api/v1/aliases:
    get:
      summary: List all aliases
      responses:
        "200":
          description: Alias list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alias"
    post:
      summary: Create an alias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Alias"
      responses:
        "201":
          description: Alias created

  /api/v1/aliases/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get alias by name
      responses:
        "200":
          description: Alias details
        "404":
          description: Not found
    put:
      summary: Update alias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Alias"
      responses:
        "200":
          description: Alias updated
    delete:
      summary: Delete alias
      responses:
        "200":
          description: Alias deleted

  /api/v1/aliases/{name}/members:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Add member to alias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                member:
                  type: string
              required: [member]
      responses:
        "200":
          description: Member added
    delete:
      summary: Remove member from alias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                member:
                  type: string
              required: [member]
      responses:
        "200":
          description: Member removed
        "404":
          description: Not found

  /api/v1/profiles:
    get:
      summary: List profiles
      responses:
        "200":
          description: Profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      summary: Create profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Profile"
      responses:
        "201":
          description: Profile created

  /api/v1/profiles/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get profile
      responses:
        "200":
          description: Profile details
    put:
      summary: Update profile
      responses:
        "200":
          description: Profile updated
    delete:
      summary: Delete profile
      responses:
        "200":
          description: Profile deleted

  /api/v1/policies:
    get:
      summary: List policies
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Policy"
    post:
      summary: Create policy with rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Policy"
      responses:
        "201":
          description: Policy created

  /api/v1/policies/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get policy with rules
      responses:
        "200":
          description: Policy details
    put:
      summary: Update policy and rules
      responses:
        "200":
          description: Policy updated
    delete:
      summary: Delete policy
      responses:
        "200":
          description: Policy deleted

  /api/v1/policies/{name}/rules:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Add rule to policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Rule"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"

  /api/v1/rules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Delete a rule by ID
      responses:
        "200":
          description: Rule deleted

  /api/v1/devices:
    get:
      summary: List device assignments
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceAssignment"

  /api/v1/assign:
    post:
      summary: Assign device to profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ip:
                  type: string
                mac:
                  type: string
                hostname:
                  type: string
                profile:
                  type: string
                profile_id:
                  type: integer
              required: [ip]
      responses:
        "201":
          description: Device assigned

  /api/v1/unassign:
    delete:
      summary: Unassign device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ip:
                  type: string
              required: [ip]
      responses:
        "200":
          description: Device unassigned

  /api/v1/config/commit:
    post:
      summary: Commit current config as a new revision
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Commit successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  rev:
                    type: integer
                  message:
                    type: string

  /api/v1/config/rollback/{rev}:
    post:
      summary: Rollback to a previous revision
      parameters:
        - name: rev
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rollback successful

  /api/v1/config/revisions:
    get:
      summary: List config revisions
      responses:
        "200":
          description: Revision list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfigRevision"

  /api/v1/config/diff:
    get:
      summary: Diff between two revisions
      parameters:
        - name: rev1
          in: query
          required: true
          schema:
            type: integer
        - name: rev2
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diff result

  /api/v1/config/export:
    get:
      summary: Export current config as JSON snapshot
      responses:
        "200":
          description: Config snapshot

  /api/v1/config/import:
    post:
      summary: Import config from JSON snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config imported

  /api/v1/config/confirm:
    post:
      summary: Confirm pending apply (stops auto-rollback timer)
      responses:
        "200":
          description: Apply confirmed

  /api/v1/wg/peers:
    get:
      summary: List WireGuard peers
      responses:
        "200":
          description: Peer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WGPeer"
    post:
      summary: Add WireGuard peer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WGPeer"
      responses:
        "201":
          description: Peer added

  /api/v1/wg/peers/{pubkey}:
    delete:
      summary: Remove WireGuard peer
      parameters:
        - name: pubkey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Peer removed

  /api/v1/diag/interfaces:
    get:
      summary: List network interfaces and zone mappings
      responses:
        "200":
          description: Interface list

  /api/v1/diag/leases:
    get:
      summary: List current DHCP leases
      responses:
        "200":
          description: Lease list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lease"

  /api/v1/diag/dry-run:
    get:
      summary: Generate nftables ruleset without applying
      responses:
        "200":
          description: Generated ruleset
          content:
            application/json:
              schema:
                type: object
                properties:
                  ruleset:
                    type: string

  /api/v1/metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        "200":
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  # --- WireGuard extended ---
  /api/v1/wg/client-config:
    post:
      summary: Generate WireGuard client configuration
      tags: [wireguard]
      responses: { "200": { description: Client config text } }
  /api/v1/wg/prune:
    post:
      summary: Remove stale WireGuard peers
      tags: [wireguard]
      responses: { "200": { description: Pruned peer list } }

  # --- Services extended ---
  /api/v1/services/{name}/schema:
    get:
      summary: Get config schema for a service
      tags: [services]
      responses: { "200": { description: Config field definitions } }
  /api/v1/services/{name}/config:
    put:
      summary: Update service configuration
      tags: [services]
      responses: { "200": { description: Updated config } }

  # --- Content Filters ---
  /api/v1/content-filters:
    get:
      summary: List content filters
      tags: [content-filters]
      responses: { "200": { description: Filter list } }
    post:
      summary: Create content filter
      tags: [content-filters]
      responses: { "201": { description: Created } }
  /api/v1/content-filters/{name}:
    get:
      summary: Get content filter by name
      tags: [content-filters]
      responses: { "200": { description: Filter details } }
    put:
      summary: Update content filter
      tags: [content-filters]
      responses: { "200": { description: Updated } }
    delete:
      summary: Delete content filter
      tags: [content-filters]
      responses: { "204": { description: Deleted } }
  /api/v1/content-filters/check:
    get:
      summary: Check domain against content filters
      tags: [content-filters]
      responses: { "200": { description: Check result } }
  /api/v1/content-filters/stats:
    get:
      summary: Content filter statistics
      tags: [content-filters]
      responses: { "200": { description: Stats } }
  /api/v1/content-filters/exceptions:
    get:
      summary: List filter exceptions
      tags: [content-filters]
      responses: { "200": { description: Exception list } }
    post:
      summary: Request a filter exception
      tags: [content-filters]
      responses: { "201": { description: Exception created } }
  /api/v1/content-filters/exceptions/{id}:
    get:
      summary: Get exception details
      tags: [content-filters]
      responses: { "200": { description: Exception } }
  /api/v1/content-filters/exceptions/{id}/approve:
    post:
      summary: Approve a filter exception
      tags: [content-filters]
      responses: { "200": { description: Approved } }
  /api/v1/content-filters/exceptions/{id}/deny:
    post:
      summary: Deny a filter exception
      tags: [content-filters]
      responses: { "200": { description: Denied } }
  /api/v1/content-filters/exceptions/{id}/revoke:
    post:
      summary: Revoke an approved exception
      tags: [content-filters]
      responses: { "200": { description: Revoked } }

  # --- Fingerprints ---
  /api/v1/fingerprints:
    get:
      summary: List observed TLS fingerprints
      tags: [fingerprints]
      responses: { "200": { description: Fingerprint list } }
  /api/v1/fingerprints/{hash}:
    get:
      summary: Get fingerprint by hash
      tags: [fingerprints]
      responses: { "200": { description: Fingerprint details } }
  /api/v1/fingerprints/{hash}/identify:
    get:
      summary: Identify device by fingerprint
      tags: [fingerprints]
      responses: { "200": { description: Device identification } }
  /api/v1/fingerprints/{hash}/threat:
    get:
      summary: Check fingerprint against threat intelligence
      tags: [fingerprints]
      responses: { "200": { description: Threat assessment } }
  /api/v1/fingerprints/{hash}/assign:
    post:
      summary: Assign device profile to fingerprint
      tags: [fingerprints]
      responses: { "200": { description: Profile assigned } }

  # --- IOC (Indicators of Compromise) ---
  /api/v1/iocs:
    get:
      summary: List indicators of compromise
      tags: [iocs]
      responses: { "200": { description: IOC list } }
    post:
      summary: Add an IOC
      tags: [iocs]
      responses: { "201": { description: IOC added } }
  /api/v1/iocs/bulk:
    post:
      summary: Bulk add IOCs
      tags: [iocs]
      responses: { "200": { description: Bulk result } }
  /api/v1/iocs/{type}/{value}:
    delete:
      summary: Remove an IOC
      tags: [iocs]
      responses: { "204": { description: Removed } }
  /api/v1/iocs/match:
    get:
      summary: Check IP/domain against IOC store
      tags: [iocs]
      responses: { "200": { description: Match result } }
  /api/v1/iocs/stats:
    get:
      summary: IOC store statistics
      tags: [iocs]
      responses: { "200": { description: Stats } }
  /api/v1/iocs/templates:
    get:
      summary: List IOC feed templates
      tags: [iocs]
      responses: { "200": { description: Template list } }
    post:
      summary: Add IOC feed template
      tags: [iocs]
      responses: { "201": { description: Template added } }
  /api/v1/iocs/templates/{name}:
    delete:
      summary: Remove IOC feed template
      tags: [iocs]
      responses: { "204": { description: Removed } }
  /api/v1/iocs/mmdb:
    get:
      summary: MaxMind GeoIP database status
      tags: [iocs]
      responses: { "200": { description: MMDB status } }
  /api/v1/iocs/mmdb/refresh:
    post:
      summary: Refresh MaxMind database
      tags: [iocs]
      responses: { "200": { description: Refresh started } }
  /api/v1/iocs/mmdb/config:
    post:
      summary: Configure MaxMind auto-updater
      tags: [iocs]
      responses: { "200": { description: Config updated } }

  # --- XDP Fast Path ---
  /api/v1/xdp/status:
    get:
      summary: XDP subsystem status
      tags: [xdp]
      responses: { "200": { description: XDP status } }
  /api/v1/xdp/capabilities:
    get:
      summary: XDP hardware capabilities
      tags: [xdp]
      responses: { "200": { description: Capabilities } }
  /api/v1/xdp/stats:
    get:
      summary: XDP packet counters
      tags: [xdp]
      responses: { "200": { description: Stats } }
  /api/v1/xdp/blocklist:
    get:
      summary: List XDP blocklist entries
      tags: [xdp]
      responses: { "200": { description: Blocklist } }
    post:
      summary: Add IP to XDP blocklist
      tags: [xdp]
      responses: { "201": { description: Added } }
  /api/v1/xdp/blocklist/{ip}:
    delete:
      summary: Remove IP from XDP blocklist
      tags: [xdp]
      responses: { "204": { description: Removed } }
  /api/v1/xdp/acls:
    get:
      summary: List XDP ACL rules
      tags: [xdp]
      responses: { "200": { description: ACL list } }
    post:
      summary: Add XDP ACL rule
      tags: [xdp]
      responses: { "201": { description: Rule added } }

  # --- Diagnostics extended ---
  /api/v1/diag/topology:
    get:
      summary: Auto-detect WAN/LAN network topology
      tags: [diagnostics]
      responses: { "200": { description: Topology map } }
  /api/v1/mtu/status:
    get:
      summary: MTU status across zones
      tags: [diagnostics]
      responses: { "200": { description: MTU report } }
  /api/v1/perf/nic:
    get:
      summary: NIC performance and offload status
      tags: [diagnostics]
      responses: { "200": { description: NIC info } }

  # --- Health Probes ---

  /api/v1/healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Daemon is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/readyz:
    get:
      summary: Readiness probe (DB + firewall)
      security: []
      responses:
        "200":
          description: All subsystems ready
        "503":
          description: One or more subsystems unavailable

  # --- Services ---

  /api/v1/services:
    get:
      summary: List available services
      responses:
        "200":
          description: Service list with status

  /api/v1/services/{name}:
    get:
      summary: Get service details
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service configuration and status
    put:
      summary: Update service configuration
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service updated

  /api/v1/services/{name}/enable:
    post:
      summary: Enable a service
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service enabled

  /api/v1/services/{name}/disable:
    post:
      summary: Disable a service
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service disabled

  # --- Audit ---

  /api/v1/audit:
    get:
      summary: Query audit log
      responses:
        "200":
          description: Audit log entries

  # --- RBAC Keys ---

  /api/v1/keys:
    get:
      summary: List API keys (RBAC mode)
      responses:
        "200":
          description: API key metadata (never returns the raw key)
    post:
      summary: Create a new API key
      responses:
        "201":
          description: Key created (raw key shown once)

  /api/v1/keys/{id}:
    delete:
      summary: Revoke an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key revoked

  /api/v1/keys/{id}/rotate:
    post:
      summary: Rotate an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key rotated (new key shown once)

  # --- Diagnostics ---

  /api/v1/test:
    post:
      summary: Test packet path through firewall rules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                src:
                  type: string
                dst:
                  type: string
                proto:
                  type: string
                port:
                  type: integer
      responses:
        "200":
          description: Path test result

  /api/v1/explain:
    post:
      summary: Explain which rules match a packet path
