#cloud-config
# Gatekeeper cloud-init configuration for headless provisioning.
#
# Place this file at /etc/cloud/cloud.cfg.d/99-gatekeeper.cfg
# or pass it as user-data when creating an LXC container / VM.
#
# Supported platforms:
#   - Proxmox LXC (pass as user-data in container config)
#   - Any cloud-init capable VM (AWS, GCP, Azure, Hetzner, etc.)
#   - Manual: copy to /etc/cloud/cloud.cfg.d/ and run cloud-init single --name cc_runcmd
#
# What this does:
#   1. Installs system dependencies via apt (Debian/Ubuntu) — other distros
#      will use `gk deps check` after binary install to cover the gap.
#   2. Writes sysctl forwarding config and daemon environment file.
#   3. Runs the first-boot script which generates API key, TLS cert,
#      and starts the gatekeeperd service.
#   4. Optionally enables performance tuner and creates default zones.

package_update: true
packages:
  - nftables
  - dnsmasq
  - wireguard-tools
  - sqlite3
  - curl
  - conntrack

write_files:
  - path: /etc/gatekeeper/gatekeeperd.env
    owner: root:root
    permissions: '0600'
    content: |
      # Gatekeeper daemon environment.
      # Override these values for your deployment.
      #
      # TLS (auto-generated by first-boot if not set):
      # GATEKEEPER_TLS_CERT=/etc/gatekeeper/tls/server.crt
      # GATEKEEPER_TLS_KEY=/etc/gatekeeper/tls/server.key
      #
      # Listen address (default :8080):
      # GATEKEEPER_LISTEN=:8080
      #
      # Database path (default /var/lib/gatekeeper/gatekeeper.db):
      # GATEKEEPER_DB=/var/lib/gatekeeper/gatekeeper.db

  - path: /etc/sysctl.d/99-gatekeeper.conf
    owner: root:root
    permissions: '0644'
    content: |
      # Gatekeeper network forwarding and performance sysctls.
      net.ipv4.ip_forward=1
      net.core.netdev_max_backlog=4096
      net.core.somaxconn=16384
      net.ipv4.tcp_fastopen=3

  - path: /etc/gatekeeper/cloud-init-done
    owner: root:root
    permissions: '0644'
    content: |
      # This file indicates cloud-init provisioning has completed.
      # Delete it to re-run provisioning on next boot.

runcmd:
  - sysctl -p /etc/sysctl.d/99-gatekeeper.conf
  - /usr/local/bin/gatekeeper-first-boot.sh
  # Enable performance tuner with sensible defaults.
  - |
    if command -v gk >/dev/null 2>&1; then
      gk deps check || true
      gk service enable performance-tuner || true
    fi
